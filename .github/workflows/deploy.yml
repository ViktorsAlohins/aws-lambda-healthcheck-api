name: deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: environment to deploy
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: hashicorp/setup-terraform@v3

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: install scan tools
        run: |
          python -m pip install pip-audit
          TFSEC_VERSION=$(curl -s https://api.github.com/repos/aquasecurity/tfsec/releases/latest | grep tag_name | cut -d '"' -f4)
          curl -sL "https://github.com/aquasecurity/tfsec/releases/download/${TFSEC_VERSION}/tfsec-linux-amd64" -o /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec

      - name: scan python dependencies
        run: pip-audit -r lambda/requirements.txt

      - name: scan terraform
        run: tfsec terraform

      - name: package lambda
        run: |
          cd lambda
          zip ../lambda.zip handler.py

      - name: terraform init
        run: |
          terraform -chdir=terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ inputs.environment }}/terraform.tfstate" \
            -backend-config="region=eu-central-1" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      - name: terraform fmt
        run: terraform -chdir=terraform fmt -check

      - name: terraform validate
        run: terraform -chdir=terraform validate

      - name: terraform plan
        run: terraform -chdir=terraform plan -var-file="${{ inputs.environment }}.tfvars" -var="lambda_version=${{ github.sha }}"

      - name: terraform apply
        run: terraform -chdir=terraform apply -auto-approve -var-file="${{ inputs.environment }}.tfvars" -var="lambda_version=${{ github.sha }}"
